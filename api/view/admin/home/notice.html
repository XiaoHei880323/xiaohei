<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>公告配置</title>
    <link rel="stylesheet" href="/admin/static/common.css">
    <style>
        .view { display: none; }
        .view.on { display: block; }
        .form-wrap { max-width: 860px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .form-footer { display:flex; gap:12px; padding-top:16px; border-top:1px solid rgba(255,255,255,.08); margin-top:8px; }
        /* 公告内容预览 */
        .notice-preview {
            max-width: 560px;
            max-height: 80px;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            color: #8a9bc0;
            font-size: 12px;
            line-height: 1.5;
        }
        /* 公告弹窗预览 */
        .preview-content {
            max-height: 480px;
            overflow-y: auto;
            padding: 12px 16px;
            background: rgba(255,255,255,.03);
            border: 1px solid rgba(255,255,255,.08);
            border-radius: 6px;
            color: #e8eaf0;
            font-size: 14px;
            line-height: 1.7;
        }
        .preview-content::-webkit-scrollbar { width: 4px; }
        .preview-content::-webkit-scrollbar-thumb { background: #4a5a7a; border-radius: 2px; }
    </style>
</head>
<body>
<div class="page-wrap">

    <!-- ===== LIST VIEW ===== -->
    <div id="v-list" class="view on">
        <div class="page-header">
            <div>
                <div class="page-title">公告配置</div>
                <div class="page-subtitle">管理平台公告信息，支持富文本内容</div>
            </div>
            <button class="btn btn-primary" onclick="showForm()">+ 新增公告</button>
        </div>

        <div class="card">
            <div class="search-form">
                <div class="f-field">
                    <label>公告标题</label>
                    <input type="text" id="s-name" placeholder="搜索公告标题">
                </div>
                <button class="btn btn-primary"   onclick="load(1)">搜索</button>
                <button class="btn btn-secondary" onclick="clearFields('s-name');load(1)">重置</button>
            </div>
        </div>

        <div class="card">
            <div class="tbl-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>公告标题</th>
                            <th>公告时间</th>
                            <th>添加人</th>
                            <th>发布人</th>
                            <th>添加时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="tbody"></tbody>
                </table>
            </div>
            <div class="pager" id="pager"></div>
        </div>
    </div>

    <!-- ===== FORM VIEW ===== -->
    <div id="v-form" class="view form-wrap">
        <div class="page-header">
            <div style="display:flex;align-items:center;gap:12px">
                <button class="btn btn-secondary" onclick="showList()">← 返回列表</button>
                <div>
                    <div class="page-title" id="form-title">新增公告</div>
                    <div class="page-subtitle">填写公告信息，内容支持富文本格式</div>
                </div>
            </div>
        </div>

        <div class="card">
            <input type="hidden" id="f-id">
            <div class="mf">
                <label>公告标题 <span class="req">*</span></label>
                <input type="text" id="f-name" placeholder="请输入公告标题">
            </div>
            <div class="form-grid">
                <div class="mf">
                    <label>公告时间 <span class="req">*</span></label>
                    <input type="datetime-local" id="f-time">
                </div>
                <div class="mf">
                    <label>发布人</label>
                    <select id="f-publisher">
                        <option value="0">默认（当前操作人）</option>
                    </select>
                </div>
            </div>
            <div class="mf">
                <label>公告内容 <span class="req">*</span></label>
                <div id="f-content"></div>
            </div>
            <div class="form-footer">
                <button class="btn btn-secondary" onclick="showList()">取消</button>
                <button class="btn btn-primary"   onclick="submit()">保存</button>
            </div>
        </div>
    </div>

</div>

<!-- 删除确认 -->
<div class="mask" id="m-del">
    <div class="modal" style="max-width:400px">
        <div class="modal-hd">
            <span class="modal-title">删除确认</span>
            <button class="modal-x" onclick="closeModal('m-del')">✕</button>
        </div>
        <div class="modal-bd" style="padding:24px 20px;text-align:center">
            <div style="font-size:32px;margin-bottom:12px">⚠️</div>
            <div style="font-size:15px;font-weight:600;margin-bottom:8px">确认删除此公告？</div>
            <div style="font-size:13px;color:#8a9bc0" id="del-name"></div>
        </div>
        <div class="modal-ft">
            <button class="btn btn-secondary" onclick="closeModal('m-del')">取消</button>
            <button class="btn btn-danger"    onclick="confirmDel()">确认删除</button>
        </div>
    </div>
</div>

<!-- 公告内容预览弹窗 -->
<div class="mask" id="m-preview">
    <div class="modal" style="max-width:600px">
        <div class="modal-hd">
            <span class="modal-title" id="preview-title">公告详情</span>
            <button class="modal-x" onclick="closeModal('m-preview')">✕</button>
        </div>
        <div class="modal-bd" style="padding:16px 20px">
            <div class="preview-content" id="preview-body"></div>
        </div>
        <div class="modal-ft">
            <button class="btn btn-secondary" onclick="closeModal('m-preview')">关闭</button>
        </div>
    </div>
</div>

<script src="/admin/static/common.js"></script>
<script src="/admin/static/editor.js"></script>
<script>
    Auth.check();
    let page = 1, total = 0, ps = 15, _pendingDelId = null, noticesMap = {};
    let editor;

    // 初始化富文本编辑器
    window.addEventListener('DOMContentLoaded', () => {
        editor = new RichEditor('f-content', { placeholder: '请输入公告内容（支持富文本格式）' });
        loadPublisherOptions();
    });

    // 加载发布人下拉（管理员列表，简化处理：仅当前登录人）
    function loadPublisherOptions() {
        const info = Auth.getInfo();
        if (!info) return;
        const sel = document.getElementById('f-publisher');
        // 默认保留"当前操作人"选项，并追加当前用户
        const name = info.nickName || info.userName || '当前管理员';
        sel.innerHTML = `<option value="0">默认（${esc(name)}）</option>`;
    }

    function showList() {
        document.getElementById('v-form').classList.remove('on');
        document.getElementById('v-list').classList.add('on');
    }

    function showForm(item) {
        document.getElementById('f-id').value             = item ? item.noticeId : '';
        document.getElementById('form-title').textContent = item ? '编辑公告' : '新增公告';
        document.getElementById('f-name').value  = item?.noticeName || '';
        document.getElementById('f-time').value  = toDTLocal(item?.noticeTime || '');
        document.getElementById('f-publisher').value = '0';
        editor.setHTML(item?.noticeContent || '');
        // 若无时间，默认当前时间
        if (!item?.noticeTime) {
            const now = new Date();
            const pad = n => String(n).padStart(2, '0');
            document.getElementById('f-time').value =
                `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}`;
        }
        document.getElementById('v-list').classList.remove('on');
        document.getElementById('v-form').classList.add('on');
    }

    async function load(p) {
        page = p;
        document.getElementById('tbody').innerHTML = trLoading(7);
        const data = await api('/admin/notice/list', {
            noticeName: document.getElementById('s-name').value.trim(),
            page: p, pageSize: ps
        });
        if (!data || data.code !== 200) {
            document.getElementById('tbody').innerHTML = trEmpty(7, data?.message || '加载失败');
            return;
        }
        const d = data.data; total = d.count || 0;
        const list = d.list || [];
        if (!list.length) {
            document.getElementById('tbody').innerHTML = trEmpty(7);
            document.getElementById('pager').innerHTML = '';
            return;
        }
        noticesMap = {};
        list.forEach(n => noticesMap[n.noticeId] = n);
        document.getElementById('tbody').innerHTML = list.map(n => `
            <tr>
                <td>${n.noticeId}</td>
                <td>
                    <div style="max-width:200px">
                        <div style="font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(n.noticeName)}">${esc(n.noticeName)}</div>
                        <div class="notice-preview">${stripHtml(n.noticeContent)}</div>
                    </div>
                </td>
                <td>${n.noticeTime || '—'}</td>
                <td>${esc(n.addUser    || '—')}</td>
                <td>${esc(n.publishUser|| '—')}</td>
                <td>${n.addTime || '—'}</td>
                <td>
                    <div class="td-acts">
                        <button class="btn btn-secondary btn-sm" onclick="preview(noticesMap[${n.noticeId}])">预览</button>
                        <button class="btn btn-primary   btn-sm" onclick="editItem(noticesMap[${n.noticeId}])">编辑</button>
                        <button class="btn btn-danger    btn-sm" onclick="del(${n.noticeId},'${esc(n.noticeName)}')">删除</button>
                    </div>
                </td>
            </tr>
        `).join('');
        renderPager('pager', total, page, ps, 'load');
    }

    function editItem(n) { showForm(n); }

    function preview(n) {
        document.getElementById('preview-title').textContent = n.noticeName || '公告详情';
        document.getElementById('preview-body').innerHTML    = n.noticeContent || '<span style="color:#8a9bc0">暂无内容</span>';
        openModal('m-preview');
    }

    // 去除 HTML 标签，用于列表摘要
    function stripHtml(html) {
        if (!html) return '';
        return html.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();
    }

    async function submit() {
        const id      = document.getElementById('f-id').value;
        const name    = document.getElementById('f-name').value.trim();
        const timeVal = document.getElementById('f-time').value;
        const content = editor.getHTML();
        if (!name)    { toast('请输入公告标题', 'err'); return; }
        if (!timeVal) { toast('请选择公告时间', 'err'); return; }
        if (!content || content === '<br>') { toast('请输入公告内容', 'err'); return; }
        const body = {
            noticeName:    name,
            noticeTime:    fmtDT(timeVal),
            noticeContent: content,
            publishUid:    +document.getElementById('f-publisher').value || 0,
        };
        if (id) body.noticeId = +id;
        const data = await api(id ? '/admin/notice/updateInfo' : '/admin/notice/add', body);
        if (data?.code === 200) { toast(id ? '修改成功' : '新增成功'); showList(); load(page); }
        else toast(data?.message || '操作失败', 'err');
    }

    function del(id, name) {
        _pendingDelId = id;
        document.getElementById('del-name').textContent = name ? '「' + name + '」' : '';
        openModal('m-del');
    }
    async function confirmDel() {
        if (!_pendingDelId) return;
        const data = await api('/admin/notice/delete', { noticeId: _pendingDelId });
        _pendingDelId = null; closeModal('m-del');
        if (data?.code === 200) { toast('删除成功'); load(page); }
        else toast(data?.message || '删除失败', 'err');
    }

    load(1);
</script>
</body>
</html>
