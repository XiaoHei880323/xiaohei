<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>首页活动配置</title>
    <link rel="stylesheet" href="/admin/static/common.css">
    <style>
        .view { display: none; }
        .view.on { display: block; }
        .form-wrap { max-width: 700px; }
        .form-footer { display:flex; gap:12px; padding-top:16px; border-top:1px solid rgba(255,255,255,.08); margin-top:8px; }
        .img-preview { margin-top:8px; display:none; }
        .img-preview img { max-width:200px; max-height:120px; border-radius:6px; border:1px solid rgba(255,255,255,.1); }
        .time-row { display:flex; gap:12px; }
        .time-row .mf { flex:1; }
        .badge { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:600; }
        .badge-type1 { background:rgba(46,213,115,.12);  color:#2ed573; border:1px solid rgba(46,213,115,.25); }
        .badge-type2 { background:rgba(233,69,96,.12);   color:#e94560; border:1px solid rgba(233,69,96,.25); }
        .badge-type3 { background:rgba(74,144,226,.12);  color:#4a90e2; border:1px solid rgba(74,144,226,.25); }
        .badge-type4 { background:rgba(155,89,182,.12);  color:#c39bd3; border:1px solid rgba(155,89,182,.25); }
        .badge-on  { background:rgba(46,213,115,.12);  color:#2ed573; border:1px solid rgba(46,213,115,.25); }
        .badge-off { background:rgba(74,85,104,.18);   color:#8a9bc0; border:1px solid rgba(74,85,104,.35); }
        .badge-def { background:rgba(255,193,7,.12);   color:#ffc107; border:1px solid rgba(255,193,7,.25); }
    </style>
</head>
<body>
<div class="page-wrap">

    <!-- ===== LIST VIEW ===== -->
    <div id="v-list" class="view on">
        <div class="page-header">
            <div>
                <div class="page-title">首页活动配置</div>
                <div class="page-subtitle">管理首页展示的活动配置，支持签到、秒杀、商品、景点四种类型</div>
            </div>
            <button class="btn btn-primary" onclick="showForm()">+ 新增配置</button>
        </div>

        <div class="card">
            <div class="search-form">
                <div class="f-field">
                    <label>配置名称</label>
                    <input type="text" id="s-name" placeholder="搜索配置名称">
                </div>
                <div class="f-field">
                    <label>活动类型</label>
                    <select id="s-type">
                        <option value="0">全部</option>
                        <option value="1">签到活动</option>
                        <option value="2">秒杀活动</option>
                        <option value="3">商品活动</option>
                        <option value="4">景点活动</option>
                    </select>
                </div>
                <button class="btn btn-primary"   onclick="load(1)">搜索</button>
                <button class="btn btn-secondary" onclick="resetSearch()">重置</button>
            </div>
        </div>

        <div class="card">
            <div class="tbl-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>配置名称</th>
                            <th>配置图片</th>
                            <th>时间区间</th>
                            <th>活动类型</th>
                            <th>是否默认</th>
                            <th>状态</th>
                            <th>添加人</th>
                            <th>添加时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="tbody"></tbody>
                </table>
            </div>
            <div class="pager" id="pager"></div>
        </div>
    </div>

    <!-- ===== FORM VIEW ===== -->
    <div id="v-form" class="view form-wrap">
        <div class="page-header">
            <div style="display:flex;align-items:center;gap:12px">
                <button class="btn btn-secondary" onclick="showList()">← 返回列表</button>
                <div>
                    <div class="page-title" id="form-title">新增活动配置</div>
                    <div class="page-subtitle">填写配置基础信息</div>
                </div>
            </div>
        </div>

        <div class="card">
            <input type="hidden" id="f-id">
            <div class="mf">
                <label>配置名称 <span class="req">*</span></label>
                <input type="text" id="f-name" placeholder="请输入配置名称，如：五一签到活动入口">
            </div>
            <div class="mf">
                <label>配置图片 URL</label>
                <input type="text" id="f-img" placeholder="请输入图片链接" oninput="previewImg(this.value)">
                <div class="img-preview" id="img-preview">
                    <img id="img-prev-el" src="" alt="图片预览">
                </div>
            </div>
            <div class="time-row">
                <div class="mf">
                <div class="mf">
                    <label>开始时间 <span class="req">*</span></label>
                    <input type="datetime-local" id="f-start">
                </div>
                <div class="mf">
                    <label>结束时间 <span class="req">*</span></label>
                    <input type="datetime-local" id="f-end">
                </div>
            </div>
            <div class="mf">
                <label>活动类型 <span class="req">*</span></label>
                <select id="f-type">
                    <option value="1">签到活动</option>
                    <option value="2">秒杀活动</option>
                    <option value="3">商品活动</option>
                    <option value="4">景点活动</option>
                </select>
            </div>
            <div class="form-footer">
                <button class="btn btn-secondary" onclick="showList()">取消</button>
                <button class="btn btn-primary"   onclick="submit()">保存</button>
            </div>
        </div>
    </div>

    <!-- ===== ITEMS VIEW ===== -->
    <div id="v-items" class="view">
        <div class="page-header">
            <div style="display:flex;align-items:center;gap:12px">
                <button class="btn btn-secondary" onclick="showList()">← 返回列表</button>
                <div>
                    <div class="page-title" id="items-title">管理活动内容</div>
                    <div class="page-subtitle" id="items-sub"></div>
                </div>
            </div>
            <button class="btn btn-primary" onclick="openItemAdd()">+ 添加内容</button>
        </div>

        <div class="card">
            <div class="tbl-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>名称</th>
                            <th>关联ID</th>
                            <th>排序</th>
                            <th>添加人</th>
                            <th>添加时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="itbody"></tbody>
                </table>
            </div>
            <div class="pager" id="ipager"></div>
        </div>
    </div>

</div>

<!-- 删除配置确认 -->
<div class="mask" id="m-del">
    <div class="modal" style="max-width:400px">
        <div class="modal-hd">
            <span class="modal-title">删除确认</span>
            <button class="modal-x" onclick="closeModal('m-del')">✕</button>
        </div>
        <div class="modal-bd" style="padding:24px 20px;text-align:center">
            <div style="font-size:32px;margin-bottom:12px">⚠️</div>
            <div style="font-size:15px;font-weight:600;margin-bottom:8px">确认删除此活动配置？</div>
            <div style="font-size:13px;color:#8a9bc0" id="del-name"></div>
        </div>
        <div class="modal-ft">
            <button class="btn btn-secondary" onclick="closeModal('m-del')">取消</button>
            <button class="btn btn-danger"    onclick="confirmDel()">确认删除</button>
        </div>
    </div>
</div>

<!-- 添加/编辑配置项 -->
<div class="mask" id="m-item">
    <div class="modal" style="max-width:440px">
        <div class="modal-hd">
            <span class="modal-title" id="item-modal-title">添加活动内容</span>
            <button class="modal-x" onclick="closeModal('m-item')">✕</button>
        </div>
        <div class="modal-bd">
            <input type="hidden" id="mi-id">
            <div class="mf">
                <label id="mi-aid-label">选择内容 <span class="req">*</span></label>
                <select id="mi-aid">
                    <option value="">加载中...</option>
                </select>
            </div>
            <div class="mf">
                <label>排序值</label>
                <input type="number" id="mi-sort" value="0" placeholder="数值越小越靠前">
            </div>
        </div>
        <div class="modal-ft">
            <button class="btn btn-secondary" onclick="closeModal('m-item')">取消</button>
            <button class="btn btn-primary"   onclick="submitItem()">保存</button>
        </div>
    </div>
</div>

<!-- 删除配置项确认 -->
<div class="mask" id="m-item-del">
    <div class="modal" style="max-width:380px">
        <div class="modal-hd">
            <span class="modal-title">删除确认</span>
            <button class="modal-x" onclick="closeModal('m-item-del')">✕</button>
        </div>
        <div class="modal-bd" style="padding:24px 20px;text-align:center">
            <div style="font-size:32px;margin-bottom:12px">⚠️</div>
            <div style="font-size:15px;font-weight:600">确认删除此内容项？</div>
        </div>
        <div class="modal-ft">
            <button class="btn btn-secondary" onclick="closeModal('m-item-del')">取消</button>
            <button class="btn btn-danger"    onclick="confirmItemDel()">确认删除</button>
        </div>
    </div>
</div>

<script src="/admin/static/common.js"></script>
<script>
    Auth.check();

    // ===== 状态 =====
    let page = 1, total = 0, ps = 15, _pendingDelId = null;
    let iPage = 1, iTotal = 0, iPs = 15;
    let _curConfigId = 0, _curConfigName = '', _curActivityType = 0, _pendingItemDelId = null;
    let _nameMap = {}, configsMap = {}, itemsMap = {};

    // ===== 工具函数 =====
    const TYPE_LABELS = { 1:'签到活动', 2:'秒杀活动', 3:'商品活动', 4:'景点活动' };
    const TYPE_CLASS  = { 1:'badge-type1', 2:'badge-type2', 3:'badge-type3', 4:'badge-type4' };

    function typeLabel(t) {
        return `<span class="badge ${TYPE_CLASS[t]||'badge-off'}">${TYPE_LABELS[t]||'未知'}</span>`;
    }
    function statusLabel(s) {
        return s === 1
            ? '<span class="badge badge-on">上线</span>'
            : '<span class="badge badge-off">下线</span>';
    }
    function defaultLabel(d) {
        return d === 1 ? '<span class="badge badge-def">默认</span>' : '—';
    }
    function resetSearch() {
        document.getElementById('s-name').value = '';
        document.getElementById('s-type').value = '0';
        load(1);
    }

    // ===== 按活动类型获取名称列表 =====
    // 返回 { nameMap: {id: name}, options: [{id, name}] }
    async function fetchNameOptions(activityType) {
        const labelMap = {
            1: { path: '/admin/activity/signin/list',  label: '签到活动' },
            2: { path: '/admin/activity/seckill/list', label: '秒杀活动' },
            3: { path: '/admin/good/list',             label: '商品' },
            4: { path: '/admin/scenic/list',           label: '景点' },
        };
        const cfg = labelMap[activityType];
        if (!cfg) return { nameMap: {}, options: [] };

        const data = await api(cfg.path, { page: 1, pageSize: 500 });
        if (!data || data.code !== 200) return { nameMap: {}, options: [] };

        const nameMap = {}, options = [];
        if (activityType === 1 || activityType === 2) {
            for (const a of (data.data?.activityList || [])) {
                nameMap[a.activityId] = a.activityName;
                options.push({ id: a.activityId, name: a.activityName });
            }
        } else if (activityType === 3) {
            for (const g of (data.data?.goodList || [])) {
                nameMap[g.goodId] = g.goodName;
                options.push({ id: g.goodId, name: g.goodName });
            }
        } else if (activityType === 4) {
            for (const s of (data.data?.list || [])) {
                nameMap[s.id] = s.spotName;
                options.push({ id: s.id, name: s.spotName });
            }
        }
        return { nameMap, options };
    }

    // ===== 视图切换 =====
    function showList() {
        ['v-form','v-items'].forEach(id => document.getElementById(id).classList.remove('on'));
        document.getElementById('v-list').classList.add('on');
        _nameMap = {};
    }
    function showForm(item) {
        document.getElementById('f-id').value             = item ? item.configId : '';
        document.getElementById('form-title').textContent = item ? '编辑活动配置' : '新增活动配置';
        document.getElementById('f-name').value  = item?.configName  || '';
        document.getElementById('f-img').value   = item?.configImage || '';
        document.getElementById('f-type').value  = item ? String(item.activityType) : '1';
        document.getElementById('f-start').value = item?.startTime ? toDTLocal(item.startTime) : '';
        document.getElementById('f-end').value   = item?.endTime   ? toDTLocal(item.endTime)   : '';
        previewImg(item?.configImage || '');
        ['v-list','v-items'].forEach(id => document.getElementById(id).classList.remove('on'));
        document.getElementById('v-form').classList.add('on');
    }
    async function showItems(c) {
        const configId = c.configId, configName = c.configName, activityType = c.activityType;
        _curConfigId     = configId;
        _curConfigName   = configName;
        _curActivityType = activityType;
        _nameMap         = {};

        const typeText = TYPE_LABELS[activityType] || '';
        document.getElementById('items-title').textContent = '管理活动内容';
        document.getElementById('items-sub').textContent   = '配置：' + configName + '（' + typeText + '）';

        // 更新弹窗标签
        const aidLabel = { 1:'选择签到活动', 2:'选择秒杀活动', 3:'选择商品', 4:'选择景点' };
        document.getElementById('mi-aid-label').innerHTML =
            (aidLabel[activityType] || '选择内容') + ' <span class="req">*</span>';

        ['v-list','v-form'].forEach(id => document.getElementById(id).classList.remove('on'));
        document.getElementById('v-items').classList.add('on');

        // 预加载名称映射
        const { nameMap } = await fetchNameOptions(activityType);
        _nameMap = nameMap;

        loadItems(1);
    }

    // ===== 配置列表加载 =====
    async function load(p) {
        page = p;
        document.getElementById('tbody').innerHTML = trLoading(10);
        const data = await api('/admin/home/activityConfig/list', {
            configName:   document.getElementById('s-name').value.trim(),
            activityType: +document.getElementById('s-type').value,
            page: p, pageSize: ps
        });
        if (!data || data.code !== 200) {
            document.getElementById('tbody').innerHTML = trEmpty(10, data?.message || '加载失败');
            return;
        }
        const d = data.data; total = d.count || 0;
        const list = d.list || [];
        if (!list.length) {
            document.getElementById('tbody').innerHTML = trEmpty(10);
            document.getElementById('pager').innerHTML = '';
            return;
        }
        configsMap = {};
        list.forEach(c => configsMap[c.configId] = c);
        document.getElementById('tbody').innerHTML = list.map(c => `
            <tr>
                <td>${c.configId}</td>
                <td style="max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(c.configName)}">${esc(c.configName)}</td>
                <td>${imgCell(c.configImage)}</td>
                <td style="white-space:nowrap;font-size:12px">
                    <div>${c.startTime||'—'}</div>
                    <div style="color:#8a9bc0">至 ${c.endTime||'—'}</div>
                </td>
                <td>${typeLabel(c.activityType)}</td>
                <td>${defaultLabel(c.isDefault)}</td>
                <td>${statusLabel(c.status)}</td>
                <td>${esc(c.addUser||'—')}</td>
                <td style="white-space:nowrap">${c.addTime||'—'}</td>
                <td>
                    <div class="td-acts">
                        <button class="btn btn-primary btn-sm"   onclick="showItems(configsMap[${c.configId}])">管理内容</button>
                        <button class="btn btn-primary btn-sm"   onclick="showForm(configsMap[${c.configId}])">编辑</button>
                        <button class="btn ${c.status===1?'btn-warning':'btn-success'} btn-sm" onclick="toggleStatus(${c.configId},${c.status})">${c.status===1?'下线':'上线'}</button>
                        <button class="btn btn-secondary btn-sm" onclick="setDefault(${c.configId},'${esc(c.configName)}')" ${c.isDefault===1?'disabled':''}>设为默认</button>
                        <button class="btn btn-danger btn-sm"    onclick="del(${c.configId},'${esc(c.configName)}')">删除</button>
                    </div>
                </td>
            </tr>
        `).join('');
        renderPager('pager', total, page, ps, 'load');
    }

    // ===== 图片预览 =====
    function previewImg(url) {
        const wrap = document.getElementById('img-preview');
        const img  = document.getElementById('img-prev-el');
        if (url && url.trim()) { img.src = url.trim(); wrap.style.display = 'block'; }
        else { wrap.style.display = 'none'; }
    }

    // ===== 新增/编辑配置 =====
    async function submit() {
        const id    = document.getElementById('f-id').value;
        const name  = document.getElementById('f-name').value.trim();
        const start = fmtDT(document.getElementById('f-start').value);
        const end   = fmtDT(document.getElementById('f-end').value);
        const type  = +document.getElementById('f-type').value;
        if (!name)  { toast('请输入配置名称', 'err'); return; }
        if (!start) { toast('请选择开始时间', 'err'); return; }
        if (!end)   { toast('请选择结束时间', 'err'); return; }
        const body = {
            configName:   name,
            configImage:  document.getElementById('f-img').value.trim(),
            startTime:    start,
            endTime:      end,
            activityType: type,
        };
        if (id) body.configId = +id;
        const data = await api(id ? '/admin/home/activityConfig/updateInfo' : '/admin/home/activityConfig/add', body);
        if (data?.code === 200) { toast(id ? '修改成功' : '新增成功'); showList(); load(page); }
        else toast(data?.message || '操作失败', 'err');
    }

    // ===== 上下线 =====
    async function toggleStatus(id, curStatus) {
        const newStatus = curStatus === 1 ? 0 : 1;
        const data = await api('/admin/home/activityConfig/updateStatus', { configId: id, status: newStatus });
        if (data?.code === 200) { toast(newStatus === 1 ? '已上线' : '已下线'); load(page); }
        else toast(data?.message || '操作失败', 'err');
    }

    // ===== 设为默认 =====
    async function setDefault(id, name) {
        const data = await api('/admin/home/activityConfig/setDefault', { configId: id });
        if (data?.code === 200) { toast('已设为默认：' + name); load(page); }
        else toast(data?.message || '操作失败', 'err');
    }

    // ===== 删除配置 =====
    function del(id, name) {
        _pendingDelId = id;
        document.getElementById('del-name').textContent = name ? '「' + name + '」' : '';
        openModal('m-del');
    }
    async function confirmDel() {
        if (!_pendingDelId) return;
        const data = await api('/admin/home/activityConfig/delete', { configId: _pendingDelId });
        _pendingDelId = null; closeModal('m-del');
        if (data?.code === 200) { toast('删除成功'); load(page); }
        else toast(data?.message || '删除失败', 'err');
    }

    // ===== 配置项列表 =====
    async function loadItems(p) {
        iPage = p;
        document.getElementById('itbody').innerHTML = trLoading(7);
        const data = await api('/admin/home/activityConfig/item/list', {
            configId: _curConfigId, page: p, pageSize: iPs
        });
        if (!data || data.code !== 200) {
            document.getElementById('itbody').innerHTML = trEmpty(7, data?.message || '加载失败');
            return;
        }
        const d = data.data; iTotal = d.count || 0;
        const list = d.list || [];
        if (!list.length) {
            document.getElementById('itbody').innerHTML = trEmpty(7, '暂无内容，点击右上角「添加内容」');
            document.getElementById('ipager').innerHTML = '';
            return;
        }
        itemsMap = {};
        list.forEach(it => itemsMap[it.itemId] = it);
        document.getElementById('itbody').innerHTML = list.map(it => {
            const name = _nameMap[it.activityId] || '—';
            return `
            <tr>
                <td>${it.itemId}</td>
                <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(name)}">${esc(name)}</td>
                <td>${it.activityId}</td>
                <td>${it.sort}</td>
                <td>${esc(it.addUser||'—')}</td>
                <td style="white-space:nowrap">${it.addTime||'—'}</td>
                <td>
                    <div class="td-acts">
                        <button class="btn btn-primary btn-sm" onclick="openItemEdit(itemsMap[${it.itemId}])">编辑</button>
                        <button class="btn btn-danger  btn-sm" onclick="itemDel(${it.itemId})">删除</button>
                    </div>
                </td>
            </tr>`;
        }).join('');
        renderPager('ipager', iTotal, iPage, iPs, 'loadItems');
    }

    // ===== 填充内容选择下拉框 =====
    async function fillItemSelect(selectedId) {
        const sel = document.getElementById('mi-aid');
        sel.innerHTML = '<option value="">加载中...</option>';
        const { options } = await fetchNameOptions(_curActivityType);
        if (!options.length) {
            sel.innerHTML = '<option value="">暂无可选内容</option>';
            return;
        }
        sel.innerHTML = options.map(o =>
            `<option value="${o.id}" ${o.id === selectedId ? 'selected' : ''}>${esc(o.name)}（ID:${o.id}）</option>`
        ).join('');
    }

    // ===== 配置项操作 =====
    async function openItemAdd() {
        document.getElementById('item-modal-title').textContent = '添加活动内容';
        document.getElementById('mi-id').value   = '';
        document.getElementById('mi-sort').value = '0';
        openModal('m-item');
        await fillItemSelect(0);
    }
    async function openItemEdit(it) {
        document.getElementById('item-modal-title').textContent = '编辑活动内容';
        document.getElementById('mi-id').value   = it.itemId;
        document.getElementById('mi-sort').value = it.sort;
        openModal('m-item');
        await fillItemSelect(it.activityId);
    }
    async function submitItem() {
        const id   = document.getElementById('mi-id').value;
        const aid  = +document.getElementById('mi-aid').value;
        const sort = +(document.getElementById('mi-sort').value) || 0;
        if (!aid) { toast('请选择内容', 'err'); return; }
        let body, path;
        if (id) {
            body = { itemId: +id, activityId: aid, sort };
            path = '/admin/home/activityConfig/item/updateInfo';
        } else {
            body = { configId: _curConfigId, activityId: aid, sort };
            path = '/admin/home/activityConfig/item/add';
        }
        const data = await api(path, body);
        if (data?.code === 200) {
            toast(id ? '修改成功' : '添加成功');
            closeModal('m-item');
            // 更新名称缓存后刷新列表
            const { nameMap } = await fetchNameOptions(_curActivityType);
            _nameMap = nameMap;
            loadItems(iPage);
        } else {
            toast(data?.message || '操作失败', 'err');
        }
    }
    function itemDel(id) {
        _pendingItemDelId = id;
        openModal('m-item-del');
    }
    async function confirmItemDel() {
        if (!_pendingItemDelId) return;
        const data = await api('/admin/home/activityConfig/item/delete', { itemId: _pendingItemDelId });
        _pendingItemDelId = null; closeModal('m-item-del');
        if (data?.code === 200) { toast('删除成功'); loadItems(iPage); }
        else toast(data?.message || '删除失败', 'err');
    }

    load(1);
</script>
</body>
</html>
