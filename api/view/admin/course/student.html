<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>学生管理</title>
    <link rel="stylesheet" href="/admin/static/common.css">
    <style>
        .view { display: none; }
        .view.on { display: block; }
        .form-wrap { max-width: 820px; }
        .form-grid { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); gap: 16px; }
        .form-footer { display: flex; gap: 12px; padding-top: 16px; margin-top: 8px; border-top: 1px solid rgba(255,255,255,.08); }
        .detail-grid { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); gap: 18px 28px; }
        .detail-label { margin-bottom: 6px; color: #8a9bc0; font-size: 13px; }
        .detail-value { min-height: 22px; color: #e8eaf0; overflow-wrap: anywhere; }
        .status-select { min-width: 130px; }
        @media (max-width: 720px) {
            .form-grid, .detail-grid { grid-template-columns: minmax(0, 1fr); }
            .search-form { align-items: stretch; }
        }
    </style>
</head>
<body>
<div class="page-wrap">
    <section id="student-list-view" class="view on">
        <div class="page-header">
            <div>
                <div class="page-title">学生管理</div>
                <div class="page-subtitle">维护学生基本资料与账号状态</div>
            </div>
            <button class="btn btn-primary" type="button" onclick="openForm()">＋ 新增学生</button>
        </div>

        <div class="card">
            <div class="search-form">
                <div class="f-field">
                    <label for="search-keyword">关键词</label>
                    <input id="search-keyword" type="text" placeholder="学号、姓名或手机号">
                </div>
                <div class="f-field">
                    <label for="search-class">班级</label>
                    <input id="search-class" type="text" placeholder="请输入班级名称">
                </div>
                <div class="f-field">
                    <label for="search-status">状态</label>
                    <select id="search-status" class="status-select">
                        <option value="">全部</option>
                        <option value="1">正常</option>
                        <option value="0">禁用</option>
                    </select>
                </div>
                <button class="btn btn-primary" type="button" onclick="loadStudents(1)">搜索</button>
                <button class="btn btn-secondary" type="button" onclick="resetSearch()">重置</button>
            </div>
        </div>

        <div class="card">
            <div class="tbl-wrap">
                <table>
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>学号</th>
                        <th>姓名</th>
                        <th>性别</th>
                        <th>班级</th>
                        <th>手机号</th>
                        <th>状态</th>
                        <th>创建时间</th>
                        <th>操作</th>
                    </tr>
                    </thead>
                    <tbody id="student-tbody"></tbody>
                </table>
            </div>
            <div class="pager" id="student-pager"></div>
        </div>
    </section>

    <section id="student-form-view" class="view form-wrap">
        <div class="page-header">
            <div style="display:flex;align-items:center;gap:12px">
                <button class="btn btn-secondary" type="button" onclick="showList()" title="返回学生列表">← 返回</button>
                <div>
                    <div class="page-title" id="form-title">新增学生</div>
                    <div class="page-subtitle">填写学生基本资料与登录信息</div>
                </div>
            </div>
        </div>

        <div class="card">
            <input id="form-id" type="hidden">
            <div class="form-grid">
                <div class="mf">
                    <label for="form-student-no">学号 <span class="req">*</span></label>
                    <input id="form-student-no" type="text" maxlength="50" placeholder="请输入学号">
                </div>
                <div class="mf">
                    <label for="form-name">姓名 <span class="req">*</span></label>
                    <input id="form-name" type="text" maxlength="100" placeholder="请输入学生姓名">
                </div>
                <div class="mf">
                    <label for="form-gender">性别</label>
                    <select id="form-gender">
                        <option value="0">未知</option>
                        <option value="1">男</option>
                        <option value="2">女</option>
                    </select>
                </div>
                <div class="mf">
                    <label for="form-class">班级</label>
                    <input id="form-class" type="text" maxlength="100" placeholder="请输入班级名称">
                </div>
                <div class="mf">
                    <label for="form-phone">手机号</label>
                    <input id="form-phone" type="tel" maxlength="20" placeholder="请输入手机号">
                </div>
                <div class="mf">
                    <label for="form-email">邮箱</label>
                    <input id="form-email" type="email" maxlength="100" placeholder="请输入邮箱">
                </div>
                <div class="mf">
                    <label for="form-password">密码 <span id="password-required" class="req">*</span></label>
                    <input id="form-password" type="password" autocomplete="new-password" placeholder="至少6位">
                </div>
                <div class="mf">
                    <label for="form-status">状态</label>
                    <select id="form-status">
                        <option value="1">正常</option>
                        <option value="0">禁用</option>
                    </select>
                </div>
            </div>
            <div class="form-footer">
                <button class="btn btn-secondary" type="button" onclick="showList()">取消</button>
                <button class="btn btn-primary" id="save-button" type="button" onclick="saveStudent()">保存</button>
            </div>
        </div>
    </section>
</div>

<div class="mask" id="detail-modal">
    <div class="modal" style="max-width:680px">
        <div class="modal-hd">
            <span class="modal-title">学生详情</span>
            <button class="modal-x" type="button" onclick="closeModal('detail-modal')" title="关闭">×</button>
        </div>
        <div class="modal-bd">
            <div class="detail-grid">
                <div><div class="detail-label">学号</div><div class="detail-value" id="detail-student-no"></div></div>
                <div><div class="detail-label">姓名</div><div class="detail-value" id="detail-name"></div></div>
                <div><div class="detail-label">性别</div><div class="detail-value" id="detail-gender"></div></div>
                <div><div class="detail-label">班级</div><div class="detail-value" id="detail-class"></div></div>
                <div><div class="detail-label">手机号</div><div class="detail-value" id="detail-phone"></div></div>
                <div><div class="detail-label">邮箱</div><div class="detail-value" id="detail-email"></div></div>
                <div><div class="detail-label">状态</div><div class="detail-value" id="detail-status"></div></div>
                <div><div class="detail-label">创建时间</div><div class="detail-value" id="detail-created"></div></div>
            </div>
        </div>
        <div class="modal-ft">
            <button class="btn btn-secondary" type="button" onclick="closeModal('detail-modal')">关闭</button>
        </div>
    </div>
</div>

<div class="mask" id="delete-modal">
    <div class="modal" style="max-width:420px">
        <div class="modal-hd">
            <span class="modal-title">确认删除</span>
            <button class="modal-x" type="button" onclick="closeModal('delete-modal')" title="关闭">×</button>
        </div>
        <div class="modal-bd">
            <p style="line-height:1.7;color:#e8eaf0">确认删除学生“<strong id="delete-name"></strong>”？删除后将无法在管理后台使用该账号。</p>
        </div>
        <div class="modal-ft">
            <button class="btn btn-secondary" type="button" onclick="closeModal('delete-modal')">取消</button>
            <button class="btn btn-danger" type="button" onclick="confirmDelete()">删除</button>
        </div>
    </div>
</div>

<script src="/admin/static/common.js"></script>
<script>
    'use strict';
    Auth.check();

    const apiBase = '/course/personnel/student/';
    const pageSize = 15;
    let currentPage = 1;
    let pendingDeleteId = 0;
    let studentRows = {};

    function genderText(gender) {
        return ({ 0: '未知', 1: '男', 2: '女' })[gender] || '未知';
    }

    function valueOrDash(value) {
        return value === null || value === undefined || value === '' ? '—' : value;
    }

    function showList() {
        document.getElementById('student-form-view').classList.remove('on');
        document.getElementById('student-list-view').classList.add('on');
    }

    function resetSearch() {
        clearFields('search-keyword', 'search-class', 'search-status');
        loadStudents(1);
    }

    async function loadStudents(page) {
        currentPage = page;
        const tbody = document.getElementById('student-tbody');
        tbody.innerHTML = trLoading(9);
        const body = {
            keyword: document.getElementById('search-keyword').value.trim(),
            className: document.getElementById('search-class').value.trim(),
            page: page,
            pageSize: pageSize
        };
        const status = document.getElementById('search-status').value;
        if (status !== '') body.status = Number(status);
        const result = await api(apiBase + 'list', body);
        if (!result || result.code !== 200) {
            tbody.innerHTML = trEmpty(9, result?.msg || '加载失败');
            document.getElementById('student-pager').innerHTML = '';
            return;
        }
        const data = result.data || {};
        const list = data.list || [];
        if (!list.length) {
            tbody.innerHTML = trEmpty(9);
            document.getElementById('student-pager').innerHTML = '';
            return;
        }
        studentRows = {};
        list.forEach(student => { studentRows[student.id] = student; });
        tbody.innerHTML = list.map(student => `
            <tr>
                <td>${student.id}</td>
                <td>${esc(student.studentNo)}</td>
                <td>${esc(student.name)}</td>
                <td>${genderText(student.gender)}</td>
                <td>${esc(valueOrDash(student.className))}</td>
                <td>${esc(valueOrDash(student.phone))}</td>
                <td>${student.status === 1 ? '<span class="badge badge-g">正常</span>' : '<span class="badge badge-r">禁用</span>'}</td>
                <td>${esc(valueOrDash(student.createTime))}</td>
                <td>
                    <div class="td-acts">
                        <button class="btn btn-secondary btn-sm" type="button" onclick="showDetail(${student.id})">查看</button>
                        <button class="btn btn-primary btn-sm" type="button" onclick="openForm(${student.id})">编辑</button>
                        <button class="btn btn-danger btn-sm" type="button" onclick="requestDelete(${student.id})">删除</button>
                    </div>
                </td>
            </tr>
        `).join('');
        renderPager('student-pager', data.count || 0, page, pageSize, 'loadStudents');
    }

    async function getStudent(id) {
        const result = await api(apiBase + 'detail', { id: id });
        if (!result || result.code !== 200) {
            toast(result?.msg || '获取学生详情失败', 'err');
            return null;
        }
        return result.data;
    }

    async function showDetail(id) {
        const student = await getStudent(id);
        if (!student) return;
        document.getElementById('detail-student-no').textContent = valueOrDash(student.studentNo);
        document.getElementById('detail-name').textContent = valueOrDash(student.name);
        document.getElementById('detail-gender').textContent = genderText(student.gender);
        document.getElementById('detail-class').textContent = valueOrDash(student.className);
        document.getElementById('detail-phone').textContent = valueOrDash(student.phone);
        document.getElementById('detail-email').textContent = valueOrDash(student.email);
        document.getElementById('detail-status').textContent = student.status === 1 ? '正常' : '禁用';
        document.getElementById('detail-created').textContent = valueOrDash(student.createTime);
        openModal('detail-modal');
    }

    async function openForm(id) {
        let student = null;
        if (id) {
            student = await getStudent(id);
            if (!student) return;
        }
        document.getElementById('form-title').textContent = student ? '编辑学生' : '新增学生';
        document.getElementById('form-id').value = student?.id || '';
        document.getElementById('form-student-no').value = student?.studentNo || '';
        document.getElementById('form-name').value = student?.name || '';
        document.getElementById('form-gender').value = String(student?.gender ?? 0);
        document.getElementById('form-class').value = student?.className || '';
        document.getElementById('form-phone').value = student?.phone || '';
        document.getElementById('form-email').value = student?.email || '';
        document.getElementById('form-password').value = '';
        document.getElementById('form-password').placeholder = student ? '不修改请留空' : '至少6位';
        document.getElementById('password-required').style.display = student ? 'none' : 'inline';
        document.getElementById('form-status').value = String(student?.status ?? 1);
        document.getElementById('student-list-view').classList.remove('on');
        document.getElementById('student-form-view').classList.add('on');
    }

    async function saveStudent() {
        const id = Number(document.getElementById('form-id').value || 0);
        const studentNo = document.getElementById('form-student-no').value.trim();
        const name = document.getElementById('form-name').value.trim();
        const password = document.getElementById('form-password').value;
        if (!studentNo) { toast('请输入学号', 'err'); return; }
        if (!name) { toast('请输入学生姓名', 'err'); return; }
        if ((!id && password.length < 6) || (id && password && password.length < 6)) {
            toast('密码不能少于6位', 'err');
            return;
        }
        const body = {
            studentNo: studentNo,
            name: name,
            gender: Number(document.getElementById('form-gender').value),
            className: document.getElementById('form-class').value.trim(),
            phone: document.getElementById('form-phone').value.trim(),
            email: document.getElementById('form-email').value.trim(),
            password: password,
            status: Number(document.getElementById('form-status').value)
        };
        if (id) body.id = id;
        const button = document.getElementById('save-button');
        button.disabled = true;
        const result = await api(apiBase + (id ? 'update' : 'add'), body);
        button.disabled = false;
        if (result?.code === 200) {
            toast(id ? '修改成功' : '新增成功');
            showList();
            loadStudents(id ? currentPage : 1);
            return;
        }
        toast(result?.msg || '保存失败', 'err');
    }

    function requestDelete(id) {
        pendingDeleteId = id;
        document.getElementById('delete-name').textContent = studentRows[id]?.name || '';
        openModal('delete-modal');
    }

    async function confirmDelete() {
        if (!pendingDeleteId) return;
        const id = pendingDeleteId;
        pendingDeleteId = 0;
        closeModal('delete-modal');
        const result = await api(apiBase + 'delete', { id: id });
        if (result?.code === 200) {
            toast('删除成功');
            loadStudents(currentPage);
            return;
        }
        toast(result?.msg || '删除失败', 'err');
    }

    loadStudents(1);
</script>
</body>
</html>
