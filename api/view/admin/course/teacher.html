<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>教师管理</title>
    <link rel="stylesheet" href="/admin/static/common.css">
    <style>
        .view { display: none; }
        .view.on { display: block; }
        .form-wrap { max-width: 820px; }
        .form-grid { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); gap: 16px; }
        .form-footer { display: flex; gap: 12px; padding-top: 16px; margin-top: 8px; border-top: 1px solid rgba(255,255,255,.08); }
        .detail-grid { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); gap: 18px 28px; }
        .detail-label { margin-bottom: 6px; color: #8a9bc0; font-size: 13px; }
        .detail-value { min-height: 22px; color: #e8eaf0; overflow-wrap: anywhere; }
        .status-select { min-width: 130px; }
        @media (max-width: 720px) {
            .form-grid, .detail-grid { grid-template-columns: minmax(0, 1fr); }
            .search-form { align-items: stretch; }
        }
    </style>
</head>
<body>
<div class="page-wrap">
    <section id="teacher-list-view" class="view on">
        <div class="page-header">
            <div>
                <div class="page-title">教师管理</div>
                <div class="page-subtitle">维护教师资料与账号状态</div>
            </div>
            <button class="btn btn-primary" type="button" onclick="openForm()">＋ 新增教师</button>
        </div>

        <div class="card">
            <div class="search-form">
                <div class="f-field">
                    <label for="search-keyword">关键词</label>
                    <input id="search-keyword" type="text" placeholder="工号、姓名或手机号">
                </div>
                <div class="f-field">
                    <label for="search-department">所属部门</label>
                    <input id="search-department" type="text" placeholder="请输入部门名称">
                </div>
                <div class="f-field">
                    <label for="search-status">状态</label>
                    <select id="search-status" class="status-select">
                        <option value="">全部</option>
                        <option value="1">正常</option>
                        <option value="0">禁用</option>
                    </select>
                </div>
                <button class="btn btn-primary" type="button" onclick="loadTeachers(1)">搜索</button>
                <button class="btn btn-secondary" type="button" onclick="resetSearch()">重置</button>
            </div>
        </div>

        <div class="card">
            <div class="tbl-wrap">
                <table>
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>工号</th>
                        <th>姓名</th>
                        <th>性别</th>
                        <th>职称</th>
                        <th>所属部门</th>
                        <th>手机号</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                    </thead>
                    <tbody id="teacher-tbody"></tbody>
                </table>
            </div>
            <div class="pager" id="teacher-pager"></div>
        </div>
    </section>

    <section id="teacher-form-view" class="view form-wrap">
        <div class="page-header">
            <div style="display:flex;align-items:center;gap:12px">
                <button class="btn btn-secondary" type="button" onclick="showList()" title="返回教师列表">← 返回</button>
                <div>
                    <div class="page-title" id="form-title">新增教师</div>
                    <div class="page-subtitle">填写教师基本资料与登录信息</div>
                </div>
            </div>
        </div>

        <div class="card">
            <input id="form-id" type="hidden">
            <div class="form-grid">
                <div class="mf">
                    <label for="form-teacher-no">教师工号 <span class="req">*</span></label>
                    <input id="form-teacher-no" type="text" maxlength="50" placeholder="请输入教师工号">
                </div>
                <div class="mf">
                    <label for="form-name">姓名 <span class="req">*</span></label>
                    <input id="form-name" type="text" maxlength="100" placeholder="请输入教师姓名">
                </div>
                <div class="mf">
                    <label for="form-gender">性别</label>
                    <select id="form-gender">
                        <option value="0">未知</option>
                        <option value="1">男</option>
                        <option value="2">女</option>
                    </select>
                </div>
                <div class="mf">
                    <label for="form-title-field">职称</label>
                    <input id="form-title-field" type="text" maxlength="100" placeholder="如：副教授">
                </div>
                <div class="mf">
                    <label for="form-department">所属部门</label>
                    <input id="form-department" type="text" maxlength="100" placeholder="请输入部门名称">
                </div>
                <div class="mf">
                    <label for="form-phone">手机号</label>
                    <input id="form-phone" type="tel" maxlength="20" placeholder="请输入手机号">
                </div>
                <div class="mf">
                    <label for="form-email">邮箱</label>
                    <input id="form-email" type="email" maxlength="100" placeholder="请输入邮箱">
                </div>
                <div class="mf">
                    <label for="form-password">密码 <span id="password-required" class="req">*</span></label>
                    <input id="form-password" type="password" autocomplete="new-password" placeholder="至少6位">
                </div>
                <div class="mf">
                    <label for="form-status">状态</label>
                    <select id="form-status">
                        <option value="1">正常</option>
                        <option value="0">禁用</option>
                    </select>
                </div>
            </div>
            <div class="form-footer">
                <button class="btn btn-secondary" type="button" onclick="showList()">取消</button>
                <button class="btn btn-primary" id="save-button" type="button" onclick="saveTeacher()">保存</button>
            </div>
        </div>
    </section>
</div>

<div class="mask" id="detail-modal">
    <div class="modal" style="max-width:680px">
        <div class="modal-hd">
            <span class="modal-title">教师详情</span>
            <button class="modal-x" type="button" onclick="closeModal('detail-modal')" title="关闭">×</button>
        </div>
        <div class="modal-bd">
            <div class="detail-grid">
                <div><div class="detail-label">教师工号</div><div class="detail-value" id="detail-teacher-no"></div></div>
                <div><div class="detail-label">姓名</div><div class="detail-value" id="detail-name"></div></div>
                <div><div class="detail-label">性别</div><div class="detail-value" id="detail-gender"></div></div>
                <div><div class="detail-label">职称</div><div class="detail-value" id="detail-title"></div></div>
                <div><div class="detail-label">所属部门</div><div class="detail-value" id="detail-department"></div></div>
                <div><div class="detail-label">手机号</div><div class="detail-value" id="detail-phone"></div></div>
                <div><div class="detail-label">邮箱</div><div class="detail-value" id="detail-email"></div></div>
                <div><div class="detail-label">状态</div><div class="detail-value" id="detail-status"></div></div>
                <div><div class="detail-label">创建时间</div><div class="detail-value" id="detail-created"></div></div>
                <div><div class="detail-label">更新时间</div><div class="detail-value" id="detail-updated"></div></div>
            </div>
        </div>
        <div class="modal-ft">
            <button class="btn btn-secondary" type="button" onclick="closeModal('detail-modal')">关闭</button>
        </div>
    </div>
</div>

<div class="mask" id="delete-modal">
    <div class="modal" style="max-width:420px">
        <div class="modal-hd">
            <span class="modal-title">确认删除</span>
            <button class="modal-x" type="button" onclick="closeModal('delete-modal')" title="关闭">×</button>
        </div>
        <div class="modal-bd">
            <p style="line-height:1.7;color:#e8eaf0">确认删除教师“<strong id="delete-name"></strong>”？删除后将无法在管理后台使用该账号。</p>
        </div>
        <div class="modal-ft">
            <button class="btn btn-secondary" type="button" onclick="closeModal('delete-modal')">取消</button>
            <button class="btn btn-danger" type="button" onclick="confirmDelete()">删除</button>
        </div>
    </div>
</div>

<script src="/admin/static/common.js"></script>
<script>
    'use strict';
    Auth.check();

    const apiBase = '/course/personnel/teacher/';
    const pageSize = 15;
    let currentPage = 1;
    let pendingDeleteId = 0;
    let teacherRows = {};

    function genderText(gender) {
        return ({ 0: '未知', 1: '男', 2: '女' })[gender] || '未知';
    }

    function valueOrDash(value) {
        return value === null || value === undefined || value === '' ? '—' : value;
    }

    function showList() {
        document.getElementById('teacher-form-view').classList.remove('on');
        document.getElementById('teacher-list-view').classList.add('on');
    }

    function resetSearch() {
        clearFields('search-keyword', 'search-department', 'search-status');
        loadTeachers(1);
    }

    async function loadTeachers(page) {
        currentPage = page;
        const tbody = document.getElementById('teacher-tbody');
        tbody.innerHTML = trLoading(9);
        const body = {
            keyword: document.getElementById('search-keyword').value.trim(),
            department: document.getElementById('search-department').value.trim(),
            page: page,
            pageSize: pageSize
        };
        const status = document.getElementById('search-status').value;
        if (status !== '') body.status = Number(status);
        const result = await api(apiBase + 'list', body);
        if (!result || result.code !== 200) {
            tbody.innerHTML = trEmpty(9, result?.msg || '加载失败');
            document.getElementById('teacher-pager').innerHTML = '';
            return;
        }
        const data = result.data || {};
        const list = data.list || [];
        if (!list.length) {
            tbody.innerHTML = trEmpty(9);
            document.getElementById('teacher-pager').innerHTML = '';
            return;
        }
        teacherRows = {};
        list.forEach(teacher => { teacherRows[teacher.id] = teacher; });
        tbody.innerHTML = list.map(teacher => `
            <tr>
                <td>${teacher.id}</td>
                <td>${esc(teacher.teacherNo)}</td>
                <td>${esc(teacher.name)}</td>
                <td>${genderText(teacher.gender)}</td>
                <td>${esc(valueOrDash(teacher.title))}</td>
                <td>${esc(valueOrDash(teacher.department))}</td>
                <td>${esc(valueOrDash(teacher.phone))}</td>
                <td>${teacher.status === 1 ? '<span class="badge badge-g">正常</span>' : '<span class="badge badge-r">禁用</span>'}</td>
                <td>
                    <div class="td-acts">
                        <button class="btn btn-secondary btn-sm" type="button" onclick="showDetail(${teacher.id})">查看</button>
                        <button class="btn btn-primary btn-sm" type="button" onclick="openForm(${teacher.id})">编辑</button>
                        <button class="btn btn-danger btn-sm" type="button" onclick="requestDelete(${teacher.id})">删除</button>
                    </div>
                </td>
            </tr>
        `).join('');
        renderPager('teacher-pager', data.count || 0, page, pageSize, 'loadTeachers');
    }

    async function getTeacher(id) {
        const result = await api(apiBase + 'detail', { id: id });
        if (!result || result.code !== 200) {
            toast(result?.msg || '获取教师详情失败', 'err');
            return null;
        }
        return result.data;
    }

    async function showDetail(id) {
        const teacher = await getTeacher(id);
        if (!teacher) return;
        document.getElementById('detail-teacher-no').textContent = valueOrDash(teacher.teacherNo);
        document.getElementById('detail-name').textContent = valueOrDash(teacher.name);
        document.getElementById('detail-gender').textContent = genderText(teacher.gender);
        document.getElementById('detail-title').textContent = valueOrDash(teacher.title);
        document.getElementById('detail-department').textContent = valueOrDash(teacher.department);
        document.getElementById('detail-phone').textContent = valueOrDash(teacher.phone);
        document.getElementById('detail-email').textContent = valueOrDash(teacher.email);
        document.getElementById('detail-status').textContent = teacher.status === 1 ? '正常' : '禁用';
        document.getElementById('detail-created').textContent = valueOrDash(teacher.createTime);
        document.getElementById('detail-updated').textContent = valueOrDash(teacher.updateTime);
        openModal('detail-modal');
    }

    async function openForm(id) {
        let teacher = null;
        if (id) {
            teacher = await getTeacher(id);
            if (!teacher) return;
        }
        document.getElementById('form-title').textContent = teacher ? '编辑教师' : '新增教师';
        document.getElementById('form-id').value = teacher?.id || '';
        document.getElementById('form-teacher-no').value = teacher?.teacherNo || '';
        document.getElementById('form-name').value = teacher?.name || '';
        document.getElementById('form-gender').value = String(teacher?.gender ?? 0);
        document.getElementById('form-title-field').value = teacher?.title || '';
        document.getElementById('form-department').value = teacher?.department || '';
        document.getElementById('form-phone').value = teacher?.phone || '';
        document.getElementById('form-email').value = teacher?.email || '';
        document.getElementById('form-password').value = '';
        document.getElementById('form-password').placeholder = teacher ? '不修改请留空' : '至少6位';
        document.getElementById('password-required').style.display = teacher ? 'none' : 'inline';
        document.getElementById('form-status').value = String(teacher?.status ?? 1);
        document.getElementById('teacher-list-view').classList.remove('on');
        document.getElementById('teacher-form-view').classList.add('on');
    }

    async function saveTeacher() {
        const id = Number(document.getElementById('form-id').value || 0);
        const teacherNo = document.getElementById('form-teacher-no').value.trim();
        const name = document.getElementById('form-name').value.trim();
        const password = document.getElementById('form-password').value;
        if (!teacherNo) { toast('请输入教师工号', 'err'); return; }
        if (!name) { toast('请输入教师姓名', 'err'); return; }
        if ((!id && password.length < 6) || (id && password && password.length < 6)) {
            toast('密码不能少于6位', 'err');
            return;
        }
        const body = {
            teacherNo: teacherNo,
            name: name,
            gender: Number(document.getElementById('form-gender').value),
            title: document.getElementById('form-title-field').value.trim(),
            department: document.getElementById('form-department').value.trim(),
            phone: document.getElementById('form-phone').value.trim(),
            email: document.getElementById('form-email').value.trim(),
            password: password,
            status: Number(document.getElementById('form-status').value)
        };
        if (id) body.id = id;
        const button = document.getElementById('save-button');
        button.disabled = true;
        const result = await api(apiBase + (id ? 'update' : 'add'), body);
        button.disabled = false;
        if (result?.code === 200) {
            toast(id ? '修改成功' : '新增成功');
            showList();
            loadTeachers(id ? currentPage : 1);
            return;
        }
        toast(result?.msg || '保存失败', 'err');
    }

    function requestDelete(id) {
        pendingDeleteId = id;
        document.getElementById('delete-name').textContent = teacherRows[id]?.name || '';
        openModal('delete-modal');
    }

    async function confirmDelete() {
        if (!pendingDeleteId) return;
        const id = pendingDeleteId;
        pendingDeleteId = 0;
        closeModal('delete-modal');
        const result = await api(apiBase + 'delete', { id: id });
        if (result?.code === 200) {
            toast('删除成功');
            loadTeachers(currentPage);
            return;
        }
        toast(result?.msg || '删除失败', 'err');
    }

    loadTeachers(1);
</script>
</body>
</html>
