<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'PingFang SC', sans-serif;
        }
        .box {
            background: rgba(255,255,255,.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,.1);
            border-radius: 20px;
            padding: 50px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px rgba(0,0,0,.5);
        }
        .logo { text-align:center; margin-bottom:40px; }
        .logo-icon {
            width:70px; height:70px;
            background: linear-gradient(135deg,#e94560,#0f3460);
            border-radius:50%;
            display:flex; align-items:center; justify-content:center;
            margin: 0 auto 16px;
            font-size:28px;
        }
        .logo h1 { color:#fff; font-size:24px; font-weight:700; letter-spacing:1px; }
        .logo p  { color:rgba(255,255,255,.5); font-size:13px; margin-top:6px; }
        .fg { margin-bottom:20px; }
        .fg label { display:block; color:rgba(255,255,255,.7); font-size:13px; margin-bottom:8px; }
        .fg-wrap { position:relative; }
        .fg-icon {
            position:absolute; left:14px; top:50%;
            transform:translateY(-50%);
            color:rgba(255,255,255,.4); font-size:16px;
            pointer-events:none;
        }
        .fg input {
            width:100%; padding:14px 14px 14px 44px;
            background:rgba(255,255,255,.08);
            border:1px solid rgba(255,255,255,.1);
            border-radius:10px;
            color:#fff; font-size:14px; outline:none;
            transition: all .3s;
        }
        .fg input::placeholder { color:rgba(255,255,255,.25); }
        .fg input:focus {
            border-color:#e94560;
            background:rgba(255,255,255,.12);
            box-shadow:0 0 0 3px rgba(233,69,96,.15);
        }
        .alert {
            display:none; padding:12px 16px; border-radius:8px;
            font-size:13px; margin-bottom:20px; gap:8px;
        }
        .alert.err { background:rgba(233,69,96,.15); border:1px solid rgba(233,69,96,.3); color:#ff6b7a; display:flex; }
        .alert.ok  { background:rgba(46,213,115,.15); border:1px solid rgba(46,213,115,.3); color:#2ed573; display:flex; }
        .btn-login {
            width:100%; padding:15px;
            background:linear-gradient(135deg,#e94560,#c73652);
            border:none; border-radius:10px;
            color:#fff; font-size:15px; font-weight:600;
            cursor:pointer; transition:all .3s;
            margin-top:10px; letter-spacing:1px;
        }
        .btn-login:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 8px 20px rgba(233,69,96,.4); }
        .btn-login:disabled { opacity:.6; cursor:not-allowed; }
        .spin {
            display:none; width:16px; height:16px;
            border:2px solid rgba(255,255,255,.4); border-top-color:#fff;
            border-radius:50%; animation:rot .8s linear infinite;
            margin-right:8px; vertical-align:middle;
        }
        .btn-login.loading .spin { display:inline-block; }
        @keyframes rot { to { transform:rotate(360deg); } }
        .footer { text-align:center; margin-top:28px; color:rgba(255,255,255,.25); font-size:12px; }
    </style>
</head>
<body>
<div class="box">
    <div class="logo">
        <div class="logo-icon">🔐</div>
        <h1>后台管理系统</h1>
        <p>Admin Management System</p>
    </div>

    <div class="alert" id="alertBox">
        <span id="alertIcon"></span>
        <span id="alertMsg"></span>
    </div>

    <form id="loginForm">
        <div class="fg">
            <label>手机号码</label>
            <div class="fg-wrap">
                <span class="fg-icon">📱</span>
                <input type="text" id="phone" placeholder="请输入手机号码" autocomplete="username">
            </div>
        </div>
        <div class="fg">
            <label>登录密码</label>
            <div class="fg-wrap">
                <span class="fg-icon">🔑</span>
                <input type="password" id="pwd" placeholder="请输入登录密码" autocomplete="current-password">
            </div>
        </div>
        <button type="submit" class="btn-login" id="loginBtn">
            <span class="spin" id="spin"></span>登 录
        </button>
    </form>

    <div class="footer">© 2024 管理后台 · 请勿泄露账号信息</div>
</div>

<script>
    const form     = document.getElementById('loginForm');
    const btn      = document.getElementById('loginBtn');
    const alertBox = document.getElementById('alertBox');

    function showAlert(type, msg) {
        alertBox.className = 'alert ' + type;
        document.getElementById('alertIcon').textContent = type === 'err' ? '✕' : '✓';
        document.getElementById('alertMsg').textContent  = msg;
    }

    function setLoading(v) {
        btn.disabled = v;
        btn.classList.toggle('loading', v);
    }

    form.addEventListener('submit', async e => {
        e.preventDefault();
        alertBox.className = 'alert';

        const phone = document.getElementById('phone').value.trim();
        const pwd   = document.getElementById('pwd').value.trim();
        if (!phone) { showAlert('err', '请输入手机号码'); return; }
        if (!pwd)   { showAlert('err', '请输入登录密码'); return; }

        setLoading(true);
        try {
            const res  = await fetch('/admin/manager/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone, pwd })
            });
            const data = await res.json();
            if (data.code === 200) {
                showAlert('ok', '登录成功，正在跳转...');
                localStorage.setItem('admin_token', data.data.token);
                localStorage.setItem('admin_info',  JSON.stringify(data.data));
                setTimeout(() => { window.location.href = '/admin/page/index'; }, 800);
            } else {
                showAlert('err', data.message || '登录失败，请检查账号密码');
            }
        } catch(e) {
            showAlert('err', '网络请求失败，请检查服务器连接');
        } finally {
            setLoading(false);
        }
    });

    document.addEventListener('keydown', e => {
        if (e.key === 'Enter') form.dispatchEvent(new Event('submit'));
    });
</script>
</body>
</html>
