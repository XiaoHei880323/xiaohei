<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>秒杀活动管理</title>
    <link rel="stylesheet" href="/admin/static/common.css">
    <style>
        .view { display: none; }
        .view.on { display: block; }
        .form-wrap { max-width: 760px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .form-footer { display:flex; gap:12px; padding-top:16px; border-top:1px solid rgba(255,255,255,.08); margin-top:8px; }
    </style>
</head>
<body>
<div class="page-wrap">

    <!-- ===== LIST VIEW ===== -->
    <div id="v-list" class="view on">
        <div class="page-header">
            <div>
                <div class="page-title">秒杀活动管理</div>
                <div class="page-subtitle">管理平台秒杀活动信息</div>
            </div>
            <button class="btn btn-primary" onclick="showForm()">+ 新增秒杀活动</button>
        </div>

        <div class="card">
            <div class="search-form">
                <div class="f-field"><label>活动名称</label><input type="text" id="s-name" placeholder="搜索活动名称"></div>
                <div class="f-field"><label>开始时间</label><input type="datetime-local" id="s-start"></div>
                <div class="f-field"><label>结束时间</label><input type="datetime-local" id="s-end"></div>
                <button class="btn btn-primary"   onclick="load(1)">搜索</button>
                <button class="btn btn-secondary" onclick="clearFields('s-name','s-start','s-end');load(1)">重置</button>
            </div>
        </div>

        <div class="card">
            <div class="tbl-wrap">
                <table>
                    <thead>
                        <tr><th>ID</th><th>活动名称</th><th>图片</th><th>开始时间</th><th>结束时间</th><th>创建时间</th><th>操作</th></tr>
                    </thead>
                    <tbody id="tbody"></tbody>
                </table>
            </div>
            <div class="pager" id="pager"></div>
        </div>
    </div>

    <!-- ===== FORM VIEW ===== -->
    <div id="v-form" class="view form-wrap">
        <div class="page-header">
            <div style="display:flex;align-items:center;gap:12px">
                <button class="btn btn-secondary" onclick="showList()">← 返回列表</button>
                <div>
                    <div class="page-title" id="form-title">新增秒杀活动</div>
                    <div class="page-subtitle">填写活动基本信息</div>
                </div>
            </div>
        </div>

        <div class="card">
            <input type="hidden" id="f-id">
            <div class="mf">
                <label>活动名称 <span class="req">*</span></label>
                <input type="text" id="f-name" placeholder="请输入活动名称">
            </div>
            <div class="mf">
                <label>活动图片 URL</label>
                <input type="text" id="f-img" placeholder="请输入图片链接（可选）" oninput="previewImg(this.value)">
                <img id="f-img-preview" src="" alt="图片预览" style="display:none;margin-top:8px;max-width:100%;max-height:200px;border-radius:6px;border:1px solid rgba(255,255,255,.12)">
            </div>
            <div class="mf">
                <label>活动描述</label>
                <textarea id="f-text" rows="3" placeholder="请输入活动描述（可选）"></textarea>
            </div>
            <div class="form-grid">
                <div class="mf"><label>开始时间 <span class="req">*</span></label><input type="datetime-local" id="f-start"></div>
                <div class="mf"><label>结束时间 <span class="req">*</span></label><input type="datetime-local" id="f-end"></div>
            </div>
            <div class="mf" style="max-width:340px">
                <label>预览时间</label>
                <input type="datetime-local" id="f-preview">
            </div>
            <div class="form-footer">
                <button class="btn btn-secondary" onclick="showList()">取消</button>
                <button class="btn btn-primary"   onclick="submit()">保存</button>
            </div>
        </div>
    </div>

</div>

<!-- 删除确认 -->
<div class="mask" id="m-del">
    <div class="modal" style="max-width:400px">
        <div class="modal-hd">
            <span class="modal-title">删除确认</span>
            <button class="modal-x" onclick="closeModal('m-del')">✕</button>
        </div>
        <div class="modal-bd" style="padding:24px 20px;text-align:center">
            <div style="font-size:32px;margin-bottom:12px">⚠️</div>
            <div style="font-size:15px;font-weight:600;margin-bottom:8px">确认删除此秒杀活动？</div>
            <div style="font-size:13px;color:#8a9bc0" id="del-name"></div>
        </div>
        <div class="modal-ft">
            <button class="btn btn-secondary" onclick="closeModal('m-del')">取消</button>
            <button class="btn btn-danger"    onclick="confirmDel()">确认删除</button>
        </div>
    </div>
</div>

<script src="/admin/static/common.js"></script>
<script>
    Auth.check();
    let page = 1, total = 0, ps = 15, _pendingDelId = null, seckillMap = {};

    function showList() {
        document.getElementById('v-form').classList.remove('on');
        document.getElementById('v-list').classList.add('on');
    }

    function showForm(item) {
        document.getElementById('f-id').value             = item ? item.activityId  : '';
        document.getElementById('form-title').textContent = item ? '编辑秒杀活动' : '新增秒杀活动';
        document.getElementById('f-name').value    = item?.activityName        || '';
        document.getElementById('f-img').value     = item?.activityImage       || '';
        previewImg(item?.activityImage || '');
        document.getElementById('f-text').value    = item?.activityText        || '';
        document.getElementById('f-start').value   = toDTLocal(item?.activityStartTime);
        document.getElementById('f-end').value     = toDTLocal(item?.activityEndTime);
        document.getElementById('f-preview').value = toDTLocal(item?.activityPreviewTime);
        document.getElementById('v-list').classList.remove('on');
        document.getElementById('v-form').classList.add('on');
    }

    async function load(p) {
        page = p;
        document.getElementById('tbody').innerHTML = trLoading(7);
        const data = await api('/admin/activity/seckill/list', {
            activityName: document.getElementById('s-name').value.trim(),
            activityStartTime: fmtDT(document.getElementById('s-start').value),
            activityEndTime:   fmtDT(document.getElementById('s-end').value),
            page: p, pageSize: ps
        });
        if (!data || data.code !== 200) { document.getElementById('tbody').innerHTML = trEmpty(7, data?.message || '加载失败'); return; }
        const d = data.data; total = d.count || 0;
        const list = d.activityList || [];
        if (!list.length) { document.getElementById('tbody').innerHTML = trEmpty(7); document.getElementById('pager').innerHTML = ''; return; }
        seckillMap = {};
        list.forEach(a => seckillMap[a.activityId] = a);
        document.getElementById('tbody').innerHTML = list.map(a => `
            <tr>
                <td>${a.activityId}</td>
                <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(a.activityName)}">${esc(a.activityName)}</td>
                <td>${imgCell(a.activityImage)}</td>
                <td>${a.activityStartTime || '—'}</td>
                <td>${a.activityEndTime   || '—'}</td>
                <td>${a.activityAddTime   || '—'}</td>
                <td>
                    <div class="td-acts">
                        <button class="btn btn-primary   btn-sm" onclick="showForm(seckillMap[${a.activityId}])">编辑</button>
                        <button class="btn btn-secondary btn-sm" onclick="goGoods(${a.activityId},'${esc(a.activityName)}')">活动商品</button>
                        <button class="btn btn-danger    btn-sm" onclick="del(${a.activityId},'${esc(a.activityName)}')">删除</button>
                    </div>
                </td>
            </tr>
        `).join('');
        renderPager('pager', total, page, ps, 'load');
    }

    async function submit() {
        const id   = document.getElementById('f-id').value;
        const name = document.getElementById('f-name').value.trim();
        if (!name) { toast('请输入活动名称', 'err'); return; }
        const body = {
            activityName:        name,
            activityImage:       document.getElementById('f-img').value.trim(),
            activityText:        document.getElementById('f-text').value.trim(),
            activityStartTime:   fmtDT(document.getElementById('f-start').value),
            activityEndTime:     fmtDT(document.getElementById('f-end').value),
            activityPreviewTime: fmtDT(document.getElementById('f-preview').value),
        };
        if (id) body.activityId = +id;
        const data = await api(id ? '/admin/activity/seckill/updateInfo' : '/admin/activity/seckill/add', body);
        if (data?.code === 200) { toast(id ? '修改成功' : '新增成功'); showList(); load(page); }
        else toast(data?.message || '操作失败', 'err');
    }

    function goGoods(activityId, activityName) {
        window.parent.document.getElementById('mainFrame').src =
            '/admin/page/activity/seckill_good?activityId=' + activityId +
            '&activityName=' + encodeURIComponent(activityName);
    }

    function del(id, name) {
        _pendingDelId = id;
        document.getElementById('del-name').textContent = name ? '「' + name + '」' : '';
        openModal('m-del');
    }
    async function confirmDel() {
        if (!_pendingDelId) return;
        const data = await api('/admin/activity/seckill/delete', { activityId: _pendingDelId });
        _pendingDelId = null; closeModal('m-del');
        if (data?.code === 200) { toast('删除成功'); load(page); }
        else toast(data?.message || '删除失败', 'err');
    }

    load(1);

    function previewImg(url) {
        const img = document.getElementById('f-img-preview');
        if (url && url.trim()) { img.src = url.trim(); img.style.display = 'block'; }
        else { img.src = ''; img.style.display = 'none'; }
    }
</script>
</body>
</html>
