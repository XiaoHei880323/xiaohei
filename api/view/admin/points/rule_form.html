<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>积分规则 - 表单</title>
    <link rel="stylesheet" href="/admin/static/common.css">
    <style>
        select {
            width: 100%; padding: 9px 12px;
            background: rgba(255,255,255,.06);
            border: 1px solid rgba(255,255,255,.12);
            border-radius: 6px; color: #e8eaf0;
            font-size: 13px; outline: none;
            transition: border .2s;
        }
        select:focus { border-color: #4a90e2; }
        select option { background: #1e2f4d; }
    </style>
</head>
<body>
<div class="page-wrap" style="max-width:600px">

    <div class="page-header">
        <div style="display:flex;align-items:center;gap:12px">
            <button class="btn btn-secondary" onclick="goBack()">← 返回列表</button>
            <div>
                <div class="page-title" id="pg-title">新增积分规则</div>
                <div class="page-subtitle">填写兑换规则信息</div>
            </div>
        </div>
    </div>

    <div class="card">
        <div style="display:flex;flex-direction:column;gap:18px;padding:4px 0">
            <input type="hidden" id="f-id">

            <div class="mf">
                <label>选择商品 <span class="req">*</span></label>
                <select id="f-good">
                    <option value="">加载中...</option>
                </select>
            </div>
            <div class="mf">
                <label>所需积分 <span class="req">*</span></label>
                <input type="number" id="f-pts" placeholder="请输入所需积分" min="1">
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
                <div class="mf">
                    <label>兑换开始时间</label>
                    <input type="datetime-local" id="f-start">
                </div>
                <div class="mf">
                    <label>兑换结束时间</label>
                    <input type="datetime-local" id="f-end">
                </div>
            </div>

            <div style="display:flex;gap:12px;padding-top:8px;border-top:1px solid rgba(255,255,255,.08)">
                <button class="btn btn-secondary" onclick="goBack()">取消</button>
                <button class="btn btn-primary"   onclick="submit()">保存</button>
            </div>
        </div>
    </div>
</div>

<script src="/admin/static/common.js"></script>
<script>
    Auth.check();

    const raw  = sessionStorage.getItem('admin_form_rule');
    const item = raw ? JSON.parse(raw) : null;
    sessionStorage.removeItem('admin_form_rule');

    async function loadGoods() {
        const data = await api('/admin/good/list', { page: 1, pageSize: 200 });
        const sel  = document.getElementById('f-good');
        if (data?.code === 200) {
            sel.innerHTML = '<option value="">请选择商品</option>' +
                (data.data.goodList || []).map(g =>
                    `<option value="${g.goodId}">${esc(g.goodName)}</option>`
                ).join('');
            if (item?.goodId) sel.value = item.goodId;
        } else {
            sel.innerHTML = '<option value="">加载失败</option>';
        }
    }

    if (item) {
        document.getElementById('pg-title').textContent = '编辑积分规则';
        document.getElementById('f-id').value           = item.pointId;
        document.getElementById('f-pts').value          = item.point          || '';
        document.getElementById('f-start').value        = toDTLocal(item.pointStartTime);
        document.getElementById('f-end').value          = toDTLocal(item.pointEndTime);
    }

    async function submit() {
        const id     = document.getElementById('f-id').value;
        const goodId = +document.getElementById('f-good').value;
        const pts    = +document.getElementById('f-pts').value;
        if (!goodId)        { toast('请选择商品', 'err'); return; }
        if (!pts || pts < 1){ toast('请输入有效积分数量', 'err'); return; }
        const body = {
            goodId,
            points:          pts,
            pointsStartTime: fmtDT(document.getElementById('f-start').value),
            pointsEndTime:   fmtDT(document.getElementById('f-end').value),
        };
        if (id) body.pointId = +id;
        const data = await api(id ? '/admin/pointsRole/update' : '/admin/pointsRole/add', body);
        if (data?.code === 200) {
            toast(id ? '修改成功' : '新增成功');
            setTimeout(goBack, 800);
        } else toast(data?.message || '操作失败', 'err');
    }

    function goBack() { window.location.href = '/admin/page/points/rule'; }

    loadGoods();
</script>
</body>
</html>
