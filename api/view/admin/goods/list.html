<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>商品管理</title>
    <link rel="stylesheet" href="/admin/static/common.css">
    <style>
        .view { display: none; }
        .view.on { display: block; }
        .form-wrap { max-width: 760px; }
        .form-footer { display:flex; gap:12px; padding-top:16px; border-top:1px solid rgba(255,255,255,.08); margin-top:8px; }
    </style>
</head>
<body>
<div class="page-wrap">

    <!-- ===== LIST VIEW ===== -->
    <div id="v-list" class="view on">
        <div class="page-header">
            <div>
                <div class="page-title">商品管理</div>
                <div class="page-subtitle">管理积分兑换商品</div>
            </div>
            <button class="btn btn-primary" onclick="showForm()">+ 新增商品</button>
        </div>

        <div class="card">
            <div class="search-form">
                <div class="f-field">
                    <label>商品名称</label>
                    <input type="text" id="s-name" placeholder="搜索商品名称">
                </div>
                <button class="btn btn-primary"   onclick="load(1)">搜索</button>
                <button class="btn btn-secondary" onclick="clearFields('s-name');load(1)">重置</button>
            </div>
        </div>

        <div class="card">
            <div class="tbl-wrap">
                <table>
                    <thead>
                        <tr><th>ID</th><th>商品名称</th><th>图片</th><th>价格</th><th>状态</th><th>操作</th></tr>
                    </thead>
                    <tbody id="tbody"></tbody>
                </table>
            </div>
            <div class="pager" id="pager"></div>
        </div>
    </div>

    <!-- ===== FORM VIEW ===== -->
    <div id="v-form" class="view form-wrap">
        <div class="page-header">
            <div style="display:flex;align-items:center;gap:12px">
                <button class="btn btn-secondary" onclick="showList()">← 返回列表</button>
                <div>
                    <div class="page-title" id="form-title">新增商品</div>
                    <div class="page-subtitle">填写商品基本信息</div>
                </div>
            </div>
        </div>

        <div class="card">
            <input type="hidden" id="f-id">
            <div class="mf">
                <label>商品名称 <span class="req">*</span></label>
                <input type="text" id="f-name" placeholder="请输入商品名称">
            </div>
            <div class="mf">
                <label>商品图片 URL</label>
                <input type="text" id="f-img" placeholder="请输入图片链接（可选）" oninput="previewImg(this.value)">
                <img id="f-img-preview" src="" alt="图片预览" style="display:none;margin-top:8px;max-width:100%;max-height:200px;border-radius:6px;border:1px solid rgba(255,255,255,.12)">
            </div>
            <div class="mf">
                <label>商品价格 <span class="req">*</span></label>
                <input type="text" id="f-price" placeholder="请输入价格，如 9.90">
            </div>
            <div class="mf">
                <label>商品描述</label>
                <div id="f-desc"></div>
            </div>
            <div class="form-footer">
                <button class="btn btn-secondary" onclick="showList()">取消</button>
                <button class="btn btn-primary"   onclick="submit()">保存</button>
            </div>
        </div>
    </div>

</div>

<!-- 删除确认 -->
<div class="mask" id="m-del">
    <div class="modal" style="max-width:400px">
        <div class="modal-hd">
            <span class="modal-title">删除确认</span>
            <button class="modal-x" onclick="closeModal('m-del')">✕</button>
        </div>
        <div class="modal-bd" style="padding:24px 20px;text-align:center">
            <div style="font-size:32px;margin-bottom:12px">⚠️</div>
            <div style="font-size:15px;font-weight:600;margin-bottom:8px">确认删除此商品？</div>
            <div style="font-size:13px;color:#8a9bc0" id="del-name"></div>
        </div>
        <div class="modal-ft">
            <button class="btn btn-secondary" onclick="closeModal('m-del')">取消</button>
            <button class="btn btn-danger"    onclick="confirmDel()">确认删除</button>
        </div>
    </div>
</div>

<script src="/admin/static/editor.js"></script>
<script src="/admin/static/common.js"></script>
<script>
    Auth.check();

    let page = 1, total = 0, ps = 15, _pendingDelId = null, goodsMap = {};
    const editor = new RichEditor('f-desc', { placeholder: '请输入商品描述（可选）' });

    function showList() {
        document.getElementById('v-form').classList.remove('on');
        document.getElementById('v-list').classList.add('on');
    }

    function showForm(item) {
        document.getElementById('f-id').value             = item ? item.goodId   : '';
        document.getElementById('form-title').textContent = item ? '编辑商品' : '新增商品';
        document.getElementById('f-name').value  = item?.goodName  || '';
        document.getElementById('f-img').value   = item?.goodImg   || '';
        document.getElementById('f-price').value = item?.goodPrice || '';
        editor.setHTML(item?.goodDesc || '');
        previewImg(item?.goodImg || '');
        document.getElementById('v-list').classList.remove('on');
        document.getElementById('v-form').classList.add('on');
    }

    async function load(p) {
        page = p;
        document.getElementById('tbody').innerHTML = trLoading(6);
        const data = await api('/admin/good/list', {
            goodName: document.getElementById('s-name').value.trim(),
            page: p, pageSize: ps
        });
        if (!data || data.code !== 200) {
            document.getElementById('tbody').innerHTML = trEmpty(6, data?.message || '加载失败');
            return;
        }
        const d = data.data; total = d.count || 0;
        const list = d.goodList || [];
        if (!list.length) { document.getElementById('tbody').innerHTML = trEmpty(6); document.getElementById('pager').innerHTML = ''; return; }
        goodsMap = {};
        list.forEach(g => goodsMap[g.goodId] = g);
        document.getElementById('tbody').innerHTML = list.map(g => `
            <tr>
                <td>${g.goodId}</td>
                <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(g.goodName)}">${esc(g.goodName)}</td>
                <td>${imgCell(g.goodImg)}</td>
                <td>¥${esc(g.goodPrice)}</td>
                <td>${g.status === 1 ? '<span class="badge badge-g">上架</span>' : '<span class="badge badge-r">下架</span>'}</td>
                <td>
                    <div class="td-acts">
                        <button class="btn btn-primary btn-sm" onclick="showForm(goodsMap[${g.goodId}])">编辑</button>
                        <button class="btn btn-${g.status === 1 ? 'warning' : 'success'} btn-sm" onclick="toggleStatus(${g.goodId},${g.status})">${g.status === 1 ? '下架' : '上架'}</button>
                        <button class="btn btn-danger btn-sm" onclick="del(${g.goodId},'${esc(g.goodName)}')">删除</button>
                    </div>
                </td>
            </tr>
        `).join('');
        renderPager('pager', total, page, ps, 'load');
    }

    async function submit() {
        const id    = document.getElementById('f-id').value;
        const name  = document.getElementById('f-name').value.trim();
        const price = document.getElementById('f-price').value.trim();
        if (!name)  { toast('请输入商品名称', 'err'); return; }
        if (!price) { toast('请输入商品价格', 'err'); return; }
        const body = {
            goodName:  name,
            goodImage: document.getElementById('f-img').value.trim(),
            goodPrice: price,
            goodDesc:  editor.getHTML(),
        };
        if (id) body.goodId = +id;
        const data = await api(id ? '/admin/good/update' : '/admin/good/add', body);
        if (data?.code === 200) { toast(id ? '修改成功' : '新增成功'); showList(); load(page); }
        else toast(data?.message || '操作失败', 'err');
    }

    async function toggleStatus(id, curStatus) {
        const newStatus = curStatus === 1 ? 0 : 1;
        const data = await api('/admin/good/updateStatus', { goodId: id, status: newStatus });
        if (data?.code === 200) { toast(newStatus === 1 ? '已上架' : '已下架'); load(page); }
        else toast(data?.message || '操作失败', 'err');
    }

    function del(id, name) {
        _pendingDelId = id;
        document.getElementById('del-name').textContent = name ? '「' + name + '」' : '';
        openModal('m-del');
    }

    async function confirmDel() {
        if (!_pendingDelId) return;
        const data = await api('/admin/good/delete', { goodId: _pendingDelId });
        _pendingDelId = null; closeModal('m-del');
        if (data?.code === 200) { toast('删除成功'); load(page); }
        else toast(data?.message || '删除失败', 'err');
    }

    function previewImg(url) {
        const img = document.getElementById('f-img-preview');
        if (url && url.trim()) { img.src = url.trim(); img.style.display = 'block'; }
        else { img.src = ''; img.style.display = 'none'; }
    }

    load(1);
</script>
</body>
</html>
